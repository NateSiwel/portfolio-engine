name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        uses: astral-sh/ruff-action@v3

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas yfinance pytest

      # Personal csvs/ and stock_data/ are gitignored, so real-data tests
      # self-skip; cache tests download a few small windows from yfinance.
      - name: Run tests
        run: python -m pytest tests -q
