name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        uses: astral-sh/ruff-action@v3

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .
